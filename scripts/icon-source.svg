<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#43B87C"/>
      <stop offset="1" stop-color="#1C6E45"/>
    </linearGradient>
  </defs>
  <!-- Full-bleed background (iOS rounds it; Android maskable-safe) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Rising trend line -->
  <polyline points="112,340 206,262 296,306 400,150"
    fill="none" stroke="#FFFFFF" stroke-width="34"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arrowhead at the top-right tip -->
  <polyline points="330,150 400,150 400,220"
    fill="none" stroke="#FFFFFF" stroke-width="34"
    stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Start dot -->
  <circle cx="112" cy="340" r="20" fill="#FFFFFF"/>
</svg>
